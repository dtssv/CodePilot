# ─── 右键快捷：走与普通对话相同的 /v1/conversation/run（短提示 + 引用），模式与工具窗一致
contextMenu.quick.refactor.selection=请帮我重构这段选中的代码（保持对外行为不变）。
contextMenu.quick.refactor.file=请帮我重构这个文件（保持对外行为不变）。
contextMenu.quick.refactor.package=请帮我重构此包/目录下的相关代码（保持对外行为不变）。

contextMenu.quick.review.selection=请帮我 review 这段选中代码（缺陷、安全、风格与改进建议）。
contextMenu.quick.review.file=请帮我 review 这个文件（缺陷、安全、风格与改进建议）。
contextMenu.quick.review.package=请帮我 review 此包/目录下的代码（缺陷、安全、风格与改进建议）。

contextMenu.quick.comment.selection=请为这段选中代码补充规范的文档/注释（不改变可执行语义）。
contextMenu.quick.comment.file=请为这个文件补充规范的文档/注释（不改变可执行语义）。
contextMenu.quick.comment.package=请根据此包/目录下的代码给出合适的文档/注释方案（不改变可执行语义）。

contextMenu.quick.gentest.selection=请为这段选中代码生成单元测试（遵循仓库测试目录与框架习惯）。
contextMenu.quick.gentest.file=请为这个文件生成单元测试（遵循仓库测试目录与框架习惯）。
contextMenu.quick.gentest.package=请为此包/目录下的代码生成单元测试（遵循仓库测试目录与框架习惯）。

contextMenu.quick.gendoc.selection=请为这段选中代码撰写或完善开发者文档。
contextMenu.quick.gendoc.file=请为这个文件撰写或完善开发者文档。
contextMenu.quick.gendoc.package=请为此包/目录撰写简明的开发者说明。

contextMenu.quick.psi.refactor.symbol=请重构此{0}「{1}」（保持行为不变，除非另有说明）。
contextMenu.quick.psi.review.symbol=请 review 此{0}「{1}」（缺陷、安全、风格与改进建议）。
contextMenu.quick.psi.comment.symbol=请为此{0}「{1}」补充文档/注释（不改变运行行为）。
contextMenu.quick.psi.gentest.symbol=请为此{0}「{1}」生成单元测试（遵循仓库约定）。
contextMenu.quick.psi.gendoc.symbol=请为此{0}「{1}」撰写开发者文档（API、参数与注意点）。

# ─── 对话窗口展示（与 Agent 模式一致：过程、约束、预期结果）────────────────────
contextMenu.refactor.chatTitle=重构 — {0}
contextMenu.refactor.chatDetail=以 Agent 模式执行：分析选区或文件，在保持对外行为不变的前提下提出重构方案，输出带行范围的 Patch JSON，并在应用前遵循样式与编译安全等校验策略。
contextMenu.refactor.apiInstruction=在保持行为不变的前提下做可读性与可维护性重构。仅按服务端动作模板返回 Patch JSON。

contextMenu.review.chatTitle=代码审查 — {0}
contextMenu.review.chatDetail=Agent 模式结构化审查：覆盖缺陷、安全、性能与风格等维度，输出审计式报告；除非策略允许，不自动改代码。
contextMenu.review.apiInstruction=进行完整代码审查（缺陷、安全、性能、风格），按动作模板输出结构化报告。

contextMenu.comment.chatTitle=文档与注释 — {0}
contextMenu.comment.chatDetail=Agent 模式并带补丁校验：按语言惯例补充 Javadoc/KDoc/文档字符串及必要的行内注释，说明非显而易见的逻辑。预期输出 Patch JSON 替换文件内容，不得改变可执行语义。
contextMenu.comment.apiInstruction=仅增加规范文档注释与行内说明，不改变可执行代码。按动作模板返回 Patch JSON。

contextMenu.gentest.chatTitle=单元测试 — {0}
contextMenu.gentest.chatDetail=Agent 模式：生成主流程与边界用例，通常以 Patch JSON 新建或更新测试文件；服务端开启时经图谱校验与修复闭环。
contextMenu.gentest.apiInstruction=生成聚焦的单元测试。按动作模板返回 Patch JSON（创建或更新测试文件）。

contextMenu.gendoc.chatTitle=开发文档 — {0}
contextMenu.gendoc.chatDetail=Agent 模式：为公开 API 与模块补充概述、参数、返回值、示例等完整说明，通过 Patch JSON 写回源码。与其它 Agent 动作相同的严格应用与校验路径。
contextMenu.gendoc.apiInstruction=在当前代码上生成完整开发文档。按动作模板返回 Patch JSON。

contextMenu.psi.gentest.chatTitle=为{0}「{1}」生成测试 — {2}
contextMenu.psi.gentest.chatDetail=作用域限定在当前类或方法：围绕其契约、边界与错误路径设计用例，以 Patch JSON 交付测试产物。
contextMenu.psi.gentest.apiInstruction=仅为该符号生成单元测试。按动作模板返回 Patch JSON。

contextMenu.psi.gendoc.chatTitle=为{0}「{1}」生成文档 — {2}
contextMenu.psi.gendoc.chatDetail=作用域限定在该符号：补充或扩展 Javadoc/KDoc（或等价文档），并兼顾使用场景说明；以 Patch JSON 更新声明所在文件。
contextMenu.psi.gendoc.apiInstruction=仅为该符号生成完整文档。按动作模板返回 Patch JSON。

contextMenu.psi.comment.chatTitle=为{0}「{1}」添加注释 — {2}
contextMenu.psi.comment.chatDetail=作用域限定在该符号：在文档注释与行内注释中说明意图、契约与微妙逻辑，不改变可执行代码；Patch JSON 须保持语义不变。
contextMenu.psi.comment.apiInstruction=仅为该符号添加文档与行内注释，不改变可执行代码。按动作模板返回 Patch JSON。

contextMenu.addToChat.needSelection=请先选中代码、文件或包。

