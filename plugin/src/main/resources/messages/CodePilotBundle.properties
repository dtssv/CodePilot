# ─── Chat turn copy (Agent-style: process + expected outcome) ───────────────
# {0} = file name (editor selection/file actions), or symbol file name for PSI actions
contextMenu.refactor.chatTitle=Refactor — {0}
contextMenu.refactor.chatDetail=Running in Agent mode: CodePilot will analyze the selection, propose refactors that preserve behavior, emit a Patch JSON with line ranges, and validate style and compile-safety constraints before you apply changes.
contextMenu.refactor.apiInstruction=Refactor for clarity and maintainability while preserving behavior. Return Patch JSON only, per server action template.

contextMenu.review.chatTitle=Code review — {0}
contextMenu.review.chatDetail=Agent-mode review: structured findings (severity, rationale, suggestions) over the current selection or file. Output is an audit-style report; no automatic patches unless the model explicitly proposes Patch JSON per policy.
contextMenu.review.apiInstruction=Perform a thorough code review: bugs, security, performance, style. Provide a structured report as required by the action template.

contextMenu.comment.chatTitle=Documentation comments — {0}
contextMenu.comment.chatDetail=Agent mode with patch verification: adds Javadoc/KDoc (or language-appropriate doc comments) plus targeted inline comments for non-obvious logic. Expect a Patch JSON replacing file content; follow language conventions and do not change executable behavior.
contextMenu.comment.apiInstruction=Add idiomatic doc and inline comments; executable code unchanged. Return Patch JSON per action template.

contextMenu.gentest.chatTitle=Unit tests — {0}
contextMenu.gentest.chatDetail=Agent mode: generates tests (happy path + edge cases), typically as a new test file via Patch JSON, with graph verify/repair when enabled on the server.
contextMenu.gentest.apiInstruction=Generate focused unit tests; return Patch JSON creating or updating test files per action template.

contextMenu.gendoc.chatTitle=Developer documentation — {0}
contextMenu.gendoc.chatDetail=Agent mode: expands public APIs and modules into full documentation—overview, parameters, returns, examples—then returns Patch JSON with documented source. Same strict apply/verify path as other Agent actions.
contextMenu.gendoc.apiInstruction=Produce comprehensive developer documentation in-place. Return Patch JSON per action template.

# PSI-scoped actions — {0}=kind label, {1}=symbol name, {2}=file name
contextMenu.psi.gentest.chatTitle=Tests for {0} «{1}» — {2}
contextMenu.psi.gentest.chatDetail=Agent mode scoped to this class or method: design tests that cover its contract, edge cases, and error paths; emit Patch JSON for the test artifact.
contextMenu.psi.gentest.apiInstruction=Generate unit tests for this symbol only; return Patch JSON per action template.

contextMenu.psi.gendoc.chatTitle=Docs for {0} «{1}» — {2}
contextMenu.psi.gendoc.chatDetail=Agent mode on this symbol: add or expand Javadoc/KDoc (or equivalent) and usage-oriented comments; output Patch JSON updating the declaring file.
contextMenu.psi.gendoc.apiInstruction=Document this symbol comprehensively in-place. Return Patch JSON per action template.

contextMenu.psi.comment.chatTitle=Comments for {0} «{1}» — {2}
contextMenu.psi.comment.chatDetail=Agent mode on this symbol: explain intent, contracts, and subtle logic with doc + inline comments only—no behavior changes; Patch JSON must preserve executable code.
contextMenu.psi.comment.apiInstruction=Add documentation and inline comments for this symbol only; executable code unchanged. Return Patch JSON per action template.

