<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodePilot Admin</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
  --green: #3fb950; --red: #f85149; --yellow: #d29922;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
a { color: var(--accent); text-decoration: none; }

/* Layout */
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 0; flex-shrink: 0; }
.sidebar h2 { font-size: 16px; padding: 8px 20px; color: var(--text); margin-bottom: 12px; }
.sidebar a { display: block; padding: 10px 20px; font-size: 14px; color: var(--text-dim); cursor: pointer; border-left: 3px solid transparent; }
.sidebar a:hover { color: var(--text); background: rgba(88,166,255,0.06); }
.sidebar a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(88,166,255,0.08); }
.main { flex: 1; overflow-y: auto; padding: 24px 32px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.header h1 { font-size: 20px; font-weight: 600; }

/* Auth overlay */
.auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
.auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 360px; }
.auth-box h2 { margin-bottom: 16px; font-size: 18px; }
.auth-box input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 14px; margin-bottom: 12px; }
.auth-box button { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
.auth-box button:hover { opacity: 0.9; }
.auth-error { color: var(--red); font-size: 13px; margin-bottom: 8px; display: none; }

/* Stats cards */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.stat-card .label { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.stat-card .value { font-size: 24px; font-weight: 700; }

/* Table */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: rgba(88,166,255,0.06); text-align: left; padding: 10px 14px; font-weight: 600; color: var(--text-dim); border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr:hover td { background: rgba(88,166,255,0.03); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
.badge-red { background: rgba(248,81,73,0.15); color: var(--red); }
.badge-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }

/* Toolbar */
.toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
.toolbar input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 13px; width: 240px; }
.toolbar button { padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; }
.toolbar button:hover { border-color: var(--accent); color: var(--accent); }
.toolbar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Pagination */
.pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; font-size: 13px; color: var(--text-dim); }
.pagination button { padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); cursor: pointer; margin: 0 4px; }
.pagination button:disabled { opacity: 0.4; cursor: default; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 50; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 680px; max-height: 80vh; overflow-y: auto; }
.modal h3 { margin-bottom: 16px; font-size: 16px; }
.modal pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 12px; overflow-x: auto; max-height: 400px; }
.modal-close { float: right; background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; }

/* Empty state */
.empty { text-align: center; padding: 48px; color: var(--text-dim); }
</style>
</head>
<body>

<!-- Auth overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2>CodePilot Admin</h2>
    <div class="auth-error" id="authError">API Key 无效</div>
    <input type="password" id="apiKeyInput" placeholder="输入 Admin API Key" />
    <button onclick="doLogin()">登录</button>
  </div>
</div>

<!-- App layout -->
<div class="sidebar">
  <h2>CodePilot</h2>
  <a class="active" onclick="switchTab('sessions')" id="nav-sessions">会话管理</a>
  <a onclick="switchTab('users')" id="nav-users">用户管理</a>
  <a onclick="switchTab('models')" id="nav-models">模型管理</a>
</div>

<div class="main" id="mainContent">
  <!-- Content rendered by JS -->
</div>

<script>
// ── State ──
let apiKey = localStorage.getItem('cp_admin_key') || '';
let currentTab = 'sessions';
let currentPage = 1;
const PAGE_SIZE = 20;

// ── Auth ──
function doLogin() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  if (!apiKey) return;
  fetch('/v1/admin/sessions/stats', { headers: { 'X-Admin-API-Key': apiKey } })
    .then(r => {
      if (r.ok) {
        localStorage.setItem('cp_admin_key', apiKey);
        document.getElementById('authOverlay').style.display = 'none';
        loadTab();
      } else {
        document.getElementById('authError').style.display = 'block';
      }
    })
    .catch(() => { document.getElementById('authError').style.display = 'block'; });
}

// Auto-login if key exists
if (apiKey) {
  fetch('/v1/admin/sessions/stats', { headers: { 'X-Admin-API-Key': apiKey } })
    .then(r => {
      if (r.ok) { document.getElementById('authOverlay').style.display = 'none'; loadTab(); }
    }).catch(() => {});
}

// ── API helper ──
async function api(path) {
  const r = await fetch(path, { headers: { 'X-Admin-API-Key': apiKey } });
  if (r.status === 401 || r.status === 403) {
    localStorage.removeItem('cp_admin_key');
    document.getElementById('authOverlay').style.display = 'flex';
    throw new Error('unauthorized');
  }
  return r.json();
}

// ── Tab switching ──
function switchTab(tab) {
  currentTab = tab;
  currentPage = 1;
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
  loadTab();
}

function loadTab() {
  switch (currentTab) {
    case 'sessions': loadSessions(); break;
    case 'users': loadUsers(); break;
    case 'models': loadModels(); break;
  }
}

// ── Sessions ──
async function loadSessions() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="header"><h1>会话管理</h1></div><div class="stats-row" id="sessionStats"></div><div class="toolbar"><input id="sessionSearch" placeholder="搜索会话ID或用户..." /><button class="primary" onclick="searchSessions()">搜索</button></div><div class="table-wrap" id="sessionTable"></div>';
  // Stats
  try {
    const statsRes = await api('/v1/admin/sessions/stats');
    const s = statsRes.data || {};
    document.getElementById('sessionStats').innerHTML = `
      <div class="stat-card"><div class="label">总会话数</div><div class="value">${s.totalSessions || 0}</div></div>
      <div class="stat-card"><div class="label">活跃会话</div><div class="value">${s.activeSessions || 0}</div></div>
      <div class="stat-card"><div class="label">今日新增</div><div class="value">${s.todaySessions || 0}</div></div>
      <div class="stat-card"><div class="label">平均Token用量</div><div class="value">${s.avgTokens || 0}</div></div>`;
  } catch(e) {}
  // Table
  await fetchSessions();
}

async function fetchSessions() {
  const search = document.getElementById('sessionSearch')?.value || '';
  const params = new URLSearchParams({ page: currentPage, size: PAGE_SIZE });
  if (search) params.set('keyword', search);
  try {
    const res = await api('/v1/admin/sessions?' + params);
    const data = res.data || {};
    const items = data.items || [];
    const total = data.total || 0;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    let html = '<table><thead><tr><th>ID</th><th>用户</th><th>标题</th><th>消息数</th><th>Token</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead><tbody>';
    if (items.length === 0) {
      html += '<tr><td colspan="8" class="empty">暂无数据</td></tr>';
    }
    for (const s of items) {
      const statusBadge = s.running ? '<span class="badge badge-yellow">运行中</span>' : (s.abnormalTermination ? '<span class="badge badge-red">异常</span>' : '<span class="badge badge-green">完成</span>');
      html += `<tr>
        <td title="${s.id}">${(s.id || '').substring(0,8)}...</td>
        <td>${s.userId || '-'}</td>
        <td title="${s.title}">${(s.title || '-').substring(0,30)}</td>
        <td>${s.messageCount || 0}</td>
        <td>${s.totalTokens || 0}</td>
        <td>${statusBadge}</td>
        <td>${formatTime(s.createdAt)}</td>
        <td><a onclick="viewSession('${s.id}')">详情</a> | <a style="color:var(--red)" onclick="deleteSession('${s.id}')">删除</a></td>
      </tr>`;
    }
    html += '</tbody></table>';
    html += `<div class="pagination"><span>共 ${total} 条</span><div><button ${currentPage<=1?'disabled':''} onclick="currentPage--;fetchSessions()">上一页</button><span> ${currentPage}/${totalPages} </span><button ${currentPage>=totalPages?'disabled':''} onclick="currentPage++;fetchSessions()">下一页</button></div></div>`;
    document.getElementById('sessionTable').innerHTML = html;
  } catch(e) { console.error(e); }
}

function searchSessions() { currentPage = 1; fetchSessions(); }

async function viewSession(id) {
  try {
    const res = await api('/v1/admin/sessions/' + id);
    const s = res.data || {};
    const messages = (s.messages || []).map(m => `[${m.role}] ${m.content || ''}`).join('\n');
    showModal('会话详情: ' + id, `<pre>${messages || '无消息'}</pre>`);
  } catch(e) {}
}

async function deleteSession(id) {
  if (!confirm('确定删除会话 ' + id + '？')) return;
  try { await api('/v1/admin/sessions/' + id); loadSessions(); } catch(e) {}
}

// ── Users ──
async function loadUsers() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="header"><h1>用户管理</h1></div><div class="stats-row" id="userStats"></div><div class="toolbar"><input id="userSearch" placeholder="搜索用户..." /><button class="primary" onclick="searchUsers()">搜索</button></div><div class="table-wrap" id="userTable"></div>';
  try {
    const statsRes = await api('/v1/admin/users/stats');
    const s = statsRes.data || {};
    document.getElementById('userStats').innerHTML = `
      <div class="stat-card"><div class="label">总用户数</div><div class="value">${s.totalUsers || 0}</div></div>
      <div class="stat-card"><div class="label">日活用户</div><div class="value">${s.dau || 0}</div></div>
      <div class="stat-card"><div class="label">月活用户</div><div class="value">${s.mau || 0}</div></div>`;
  } catch(e) {}
  await fetchUsers();
}

async function fetchUsers() {
  const search = document.getElementById('userSearch')?.value || '';
  const params = new URLSearchParams({ page: currentPage, size: PAGE_SIZE });
  if (search) params.set('keyword', search);
  try {
    const res = await api('/v1/admin/users?' + params);
    const data = res.data || {};
    const items = data.items || [];
    const total = data.total || 0;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    let html = '<table><thead><tr><th>用户ID</th><th>会话数</th><th>Token总量</th><th>费用($)</th><th>状态</th><th>操作</th></tr></thead><tbody>';
    if (items.length === 0) html += '<tr><td colspan="6" class="empty">暂无数据</td></tr>';
    for (const u of items) {
      const badge = u.enabled ? '<span class="badge badge-green">启用</span>' : '<span class="badge badge-red">禁用</span>';
      html += `<tr>
        <td>${u.id || '-'}</td>
        <td>${u.sessionCount || 0}</td>
        <td>${u.totalTokens || 0}</td>
        <td>${(u.totalCost || 0).toFixed(4)}</td>
        <td>${badge}</td>
        <td><a onclick="toggleUser('${u.id}', ${!u.enabled})">${u.enabled ? '禁用' : '启用'}</a></td>
      </tr>`;
    }
    html += '</tbody></table>';
    html += `<div class="pagination"><span>共 ${total} 条</span><div><button ${currentPage<=1?'disabled':''} onclick="currentPage--;fetchUsers()">上一页</button><span> ${currentPage}/${totalPages} </span><button ${currentPage>=totalPages?'disabled':''} onclick="currentPage++;fetchUsers()">下一页</button></div></div>`;
    document.getElementById('userTable').innerHTML = html;
  } catch(e) {}
}

function searchUsers() { currentPage = 1; fetchUsers(); }

async function toggleUser(id, enable) {
  try { await api('/v1/admin/users/' + id + '/status', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Admin-API-Key': apiKey }, body: JSON.stringify({ enabled: enable }) }); loadUsers(); } catch(e) {}
}

// ── Models ──
async function loadModels() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="header"><h1>模型管理</h1></div><div class="stats-row" id="modelStats"></div><div class="table-wrap" id="modelTable"></div>';
  try {
    const statsRes = await api('/v1/admin/models/stats');
    const s = statsRes.data || {};
    document.getElementById('modelStats').innerHTML = `
      <div class="stat-card"><div class="label">模型总数</div><div class="value">${s.totalModels || 0}</div></div>
      <div class="stat-card"><div class="label">今日调用量</div><div class="value">${s.todayCalls || 0}</div></div>
      <div class="stat-card"><div class="label">今日Token</div><div class="value">${s.todayTokens || 0}</div></div>
      <div class="stat-card"><div class="label">今日费用($)</div><div class="value">${(s.todayCost || 0).toFixed(2)}</div></div>`;
  } catch(e) {}
  await fetchModels();
}

async function fetchModels() {
  const params = new URLSearchParams({ page: currentPage, size: PAGE_SIZE });
  try {
    const res = await api('/v1/admin/models?' + params);
    const data = res.data || {};
    const items = data.items || [];
    const total = data.total || 0;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    let html = '<table><thead><tr><th>ID</th><th>名称</th><th>Provider</th><th>状态</th><th>限流(次/分)</th><th>调用量</th><th>Token</th><th>操作</th></tr></thead><tbody>';
    if (items.length === 0) html += '<tr><td colspan="8" class="empty">暂无数据</td></tr>';
    for (const m of items) {
      const badge = m.enabled ? '<span class="badge badge-green">启用</span>' : '<span class="badge badge-red">禁用</span>';
      html += `<tr>
        <td>${(m.id || '').toString().substring(0,8)}</td>
        <td>${m.name || '-'}</td>
        <td>${m.provider || '-'}</td>
        <td>${badge}</td>
        <td>${m.rateLimitPerMinute || '-'}</td>
        <td>${m.callCount || 0}</td>
        <td>${m.totalTokens || 0}</td>
        <td><a onclick="toggleModel('${m.id}', ${!m.enabled})">${m.enabled ? '禁用' : '启用'}</a></td>
      </tr>`;
    }
    html += '</tbody></table>';
    html += `<div class="pagination"><span>共 ${total} 条</span><div><button ${currentPage<=1?'disabled':''} onclick="currentPage--;fetchModels()">上一页</button><span> ${currentPage}/${totalPages} </span><button ${currentPage>=totalPages?'disabled':''} onclick="currentPage++;fetchModels()">下一页</button></div></div>`;
    document.getElementById('modelTable').innerHTML = html;
  } catch(e) {}
}

async function toggleModel(id, enable) {
  try {
    await fetch('/v1/admin/models/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Admin-API-Key': apiKey },
      body: JSON.stringify({ enabled: enable })
    });
    loadModels();
  } catch(e) {}
}

// ── Helpers ──
function formatTime(t) {
  if (!t) return '-';
  try { return new Date(t).toLocaleString('zh-CN'); } catch(e) { return t; }
}

function showModal(title, bodyHtml) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button><h3>${title}</h3>${bodyHtml}</div>`;
  document.body.appendChild(overlay);
}
</script>
</body>
</html>
