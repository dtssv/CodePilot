server:
  port: ${CODEPILOT_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  netty:
    idle-timeout: 120s

spring:
  profiles:
    active: ${CODEPILOT_SPRING_PROFILES:dev}
  application:
    name: codePilot-backend
  main:
    banner-mode: off
    web-application-type: reactive
  lifecycle:
    timeout-per-shutdown-phase: 55s
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${CODEPILOT_DB_URL:jdbc:mysql://localhost:3306/codepilot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&allowEmptyPasswords=true}
    username: ${CODEPILOT_DB_USER:root}
    password: ${CODEPILOT_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      test-on-borrow: true
      connection-test-query: SELECT 1
      pool-name: codePilotHikari
      maximum-pool-size: ${CODEPILOT_DB_POOL_MAX:40}
      minimum-idle: 4
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 10000
      leak-detection-threshold: 10000
  data:
    redis:
      url: ${CODEPILOT_REDIS_URL:redis://localhost:6379}
      timeout: 5s
      connect-timeout: 3s
      lettuce:
        pool:
          max-active: 64
          max-idle: 32
          min-idle: 4
  ai:
    openai:
      base-url: ${CODEPILOT_LLM_BASE_URL:https://api.openai.com}
      api-key: ${CODEPILOT_LLM_API_KEY:sk-xxx}
      chat:
        options:
          model: ${CODEPILOT_LLM_DEFAULT_MODEL:gpt-4o}
          temperature: 0.2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,drain
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,deployDrain
        liveness:
          include: livenessState
    drain:
      enabled: true
  tracing:
    sampling:
      probability: 1.0

codepilot:
  conversation:
    queue:
      enabled: ${CODEPILOT_CONVERSATION_QUEUE:auto}
      agent-only: true
      persistence: auto
      lease-duration: 2m
      reclaim-interval-ms: 30000
      stale-lease-grace: 15s
      reclaim-batch-size: 32
    admission:
      enabled: ${CODEPILOT_ADMISSION_ENABLED:true}
      max-global-queued: ${CODEPILOT_ADMISSION_MAX_GLOBAL_QUEUED:5000}
      max-global-running: ${CODEPILOT_ADMISSION_MAX_GLOBAL_RUNNING:800}
      max-user-queued: ${CODEPILOT_ADMISSION_MAX_USER_QUEUED:8}
      max-user-running: ${CODEPILOT_ADMISSION_MAX_USER_RUNNING:2}
      max-worker-concurrent: ${CODEPILOT_ADMISSION_MAX_WORKER_CONCURRENT:32}
      retry-after-seconds: ${CODEPILOT_ADMISSION_RETRY_AFTER:30}
  deploy:
    drain:
      enabled: ${CODEPILOT_DEPLOY_DRAIN_ENABLED:true}
      shutdown-auto-drain: ${CODEPILOT_DEPLOY_DRAIN_ON_SHUTDOWN:true}
      reject-new-runs: true
      readiness-when-draining: true
      default-timeout: 55s
      shutdown-timeout: 55s
  speech:
    # OpenAI-compatible speech-to-text endpoint. Defaults to the LLM provider.
    base-url: ${CODEPILOT_STT_BASE_URL:${CODEPILOT_LLM_BASE_URL:https://api.openai.com}}
    api-key: ${CODEPILOT_STT_API_KEY:${CODEPILOT_LLM_API_KEY:sk-xxx}}
    model: ${CODEPILOT_STT_MODEL:whisper-1}
  share:
    storage-dir: ${CODEPILOT_SHARE_STORAGE_DIR:${java.io.tmpdir}/codepilot-share}
    persistence: ${CODEPILOT_SHARE_PERSISTENCE:auto}
    public-base-url: ${CODEPILOT_SHARE_PUBLIC_BASE_URL:http://localhost:8080}
  background:
    persistence: ${CODEPILOT_BACKGROUND_PERSISTENCE:auto}
    storage-file: ${CODEPILOT_BACKGROUND_STORAGE_FILE:${java.io.tmpdir}/codepilot-bg/tasks.json}
  usage:
    # auto: use DB when Flyway V8 tables exist; file fallback otherwise
    persistence: ${CODEPILOT_USAGE_PERSISTENCE:auto}
    storage-file: ${CODEPILOT_USAGE_STORAGE_FILE:${java.io.tmpdir}/codepilot-usage/records.json}
    max-records: ${CODEPILOT_USAGE_MAX_RECORDS:10000}
  security:
    jwt-secret: ${CODEPILOT_JWT_SECRET:codepilot-dev-jwt-secret-at-least-32-chars!!}
    hmac-secret: ${CODEPILOT_HMAC_SECRET:codepilot-dev-hmac-secret-at-least-32-chars!!}
    # Dev token for bypassing HMAC+JWT auth in development builds.
    # MUST be empty in production. Set CODEPILOT_DEV_TOKEN env var to enable.
    dev-token: ${CODEPILOT_DEV_TOKEN:devToken}
    sso:
      oidc:
        issuer: ${CODEPILOT_OIDC_ISSUER:https://accounts.codepilot.local}
        jwks-uri: ${CODEPILOT_OIDC_JWKS_URI:https://accounts.codepilot.local/.well-known/jwks.json}
        audiences:
          - ${CODEPILOT_OIDC_AUDIENCE:codepilot}
        jwks-cache-ttl: ${CODEPILOT_OIDC_JWKS_TTL:15m}
        device-flow:
          authorization-endpoint: ${CODEPILOT_OIDC_DEVICE_AUTH_ENDPOINT:https://accounts.codepilot.local/oauth/device/code}
          token-endpoint: ${CODEPILOT_OIDC_TOKEN_ENDPOINT:https://accounts.codepilot.local/oauth/token}
          client-id: ${CODEPILOT_OIDC_CLIENT_ID:codepilot-cli}
          client-secret: ${CODEPILOT_OIDC_CLIENT_SECRET:}
          scope: ${CODEPILOT_OIDC_SCOPE:openid profile email offline_access}
      hmac-bridge:
        secret: ${CODEPILOT_SSO_BRIDGE_SECRET:codepilot-dev-hmac-bridge-secret-32ch!!}
      dev:
        enabled: ${CODEPILOT_SSO_DEV_ENABLED:true}
        token: ${CODEPILOT_SSO_DEV_TOKEN:devToken}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs