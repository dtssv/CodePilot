server:
  port: ${CODEPILOT_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  netty:
    idle-timeout: 120s

spring:
  profiles:
    active: ${CODEPILOT_SPRING_PROFILES:dev}
  application:
    name: codePilot-backend
  main:
    banner-mode: off
    web-application-type: reactive
  lifecycle:
    timeout-per-shutdown-phase: 20s
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${CODEPILOT_DB_URL:jdbc:mysql://localhost:3306/codepilot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${CODEPILOT_DB_USER:root}
    password: ${CODEPILOT_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: codePilotHikari
      maximum-pool-size: ${CODEPILOT_DB_POOL_MAX:40}
      minimum-idle: 4
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 10000
      leak-detection-threshold: 10000
  data:
    redis:
      url: ${CODEPILOT_REDIS_URL:redis://localhost:6379}
      timeout: 5s
      connect-timeout: 3s
      lettuce:
        pool:
          max-active: 64
          max-idle: 32
          min-idle: 4
  ai:
    openai:
      base-url: ${CODEPILOT_LLM_BASE_URL:https://api.openai.com}
      api-key: ${CODEPILOT_LLM_API_KEY:sk-xxx}
      chat:
        options:
          model: ${CODEPILOT_LLM_DEFAULT_MODEL:gpt-4o}
          temperature: 0.2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: 1.0

codepilot:
  security:
    jwt-secret: ${CODEPILOT_JWT_SECRET:codepilot-dev-jwt-secret-at-least-32-chars!!}
    hmac-secret: ${CODEPILOT_HMAC_SECRET:codepilot-dev-hmac-secret-at-least-32-chars!!}
    # Dev token for bypassing HMAC+JWT auth in development builds.
    # MUST be empty in production. Set CODEPILOT_DEV_TOKEN env var to enable.
    dev-token: ${CODEPILOT_DEV_TOKEN:devToken}
    sso:
      oidc:
        issuer: ${CODEPILOT_OIDC_ISSUER:https://accounts.codepilot.local}
        jwks-uri: ${CODEPILOT_OIDC_JWKS_URI:https://accounts.codepilot.local/.well-known/jwks.json}
        audiences:
          - ${CODEPILOT_OIDC_AUDIENCE:codepilot}
        jwks-cache-ttl: ${CODEPILOT_OIDC_JWKS_TTL:15m}
        device-flow:
          authorization-endpoint: ${CODEPILOT_OIDC_DEVICE_AUTH_ENDPOINT:https://accounts.codepilot.local/oauth/device/code}
          token-endpoint: ${CODEPILOT_OIDC_TOKEN_ENDPOINT:https://accounts.codepilot.local/oauth/token}
          client-id: ${CODEPILOT_OIDC_CLIENT_ID:codepilot-cli}
          client-secret: ${CODEPILOT_OIDC_CLIENT_SECRET:}
          scope: ${CODEPILOT_OIDC_SCOPE:openid profile email offline_access}
      hmac-bridge:
        secret: ${CODEPILOT_SSO_BRIDGE_SECRET:codepilot-dev-hmac-bridge-secret-32ch!!}
      dev:
        enabled: ${CODEPILOT_SSO_DEV_ENABLED:true}
        token: ${CODEPILOT_SSO_DEV_TOKEN:devToken}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs