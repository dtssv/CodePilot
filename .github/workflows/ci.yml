name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  backend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: codepilot_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test -d codepilot_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Build & Test backend
        working-directory: backend
        env:
          CODEPILOT_DB_URL: jdbc:postgresql://localhost:5432/codepilot_test
          CODEPILOT_DB_USER: test
          CODEPILOT_DB_PASSWORD: test
          CODEPILOT_REDIS_URL: redis://localhost:6379
          CODEPILOT_LLM_BASE_URL: http://localhost:19999
          CODEPILOT_LLM_API_KEY: test
          CODEPILOT_LLM_DEFAULT_MODEL: test-model
          CODEPILOT_JWT_SECRET: "01234567890123456789012345678901"
          CODEPILOT_HMAC_SECRET: "01234567890123456789012345678901"
          CODEPILOT_SSO_DEV_ENABLED: "true"
          CODEPILOT_SSO_DEV_TOKEN: "test-dev-token-16ch"
          SPRING_PROFILES_ACTIVE: dev
        run: |
          chmod +x gradlew
          ./gradlew clean build --no-daemon

  backend-image:
    needs: backend-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f scripts/deploy/Dockerfile -t ghcr.io/${{ github.repository }}/codepilot-backend:${{ github.sha }} .
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}/codepilot-backend:${{ github.sha }}
      - name: Sign image with cosign (keyless)
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ghcr.io/${{ github.repository }}/codepilot-backend:${{ github.sha }}

  plugin-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Build plugin
        working-directory: plugin
        run: |
          chmod +x gradlew
          ./gradlew clean buildPlugin --no-daemon
      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: codePilot-plugin
          path: plugin/build/distributions/*.zip

  trivy-scan:
    needs: backend-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/codepilot-backend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH